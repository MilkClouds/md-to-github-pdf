name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv tool run ruff check .

      - name: Ruff format check
        run: uv tool run ruff format --check .

      - name: Install Chromium for smoke test
        run: uv run --extra test python -m playwright install --with-deps chromium

      - name: Pytest
        env:
          PDF_SMOKE: "1"
        run: uv run --extra test pytest -v
